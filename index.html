<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Countdown to July 18, 2026</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
		:root{--bg:#ffe0ee;--card:#ffc5d9;--accent:#ff6b9a;--muted:#f26180}
		html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
		body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff 0%,#ffeef6 100%);position:relative;overflow:hidden}
		body::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:
			radial-gradient(circle at 10% 20%, rgba(255,107,154,0.95) 0 3px, transparent 3px 100%),
			radial-gradient(circle at 30% 40%, rgba(255,107,154,0.85) 0 3px, transparent 3px 100%),
			radial-gradient(circle at 70% 30%, rgba(255,107,154,0.8) 0 3px, transparent 3px 100%),
			radial-gradient(circle at 85% 75%, rgba(255,107,154,0.9) 0 3px, transparent 3px 100%),
			radial-gradient(circle at 50% 80%, rgba(255,107,154,0.75) 0 3px, transparent 3px 100%);
			background-size:220px 220px;opacity:0.9}
		.heart-layer{position:fixed;inset:0;pointer-events:none;z-index:0}
		.heart-layer-bottom{position:fixed;left:0;right:0;bottom:0;height:300px;pointer-events:none;z-index:1}
		.heart-waterfall{position:fixed;left:0;right:0;top:0;height:100vh;pointer-events:none;z-index:0}
		.heart-fall{position:absolute;font-size:28px;line-height:1;color:#ff4f84;opacity:0.7;text-shadow:0 0 8px rgba(255,107,154,0.6);animation:heartFall 4s linear forwards}
		.wrap{background:var(--card);border-radius:20px;padding:34px;box-shadow:0 10px 30px rgba(10,15,30,0.08);max-width:720px;width:92%;display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:center;position:relative;z-index:1}
		.hero-text{display:flex;flex-direction:column;align-items:center;text-align:center}
		h1{margin:0 0 6px;font-size:22px;line-height:1.6;color:#da0053;font-family:'Press Start 2P', monospace;letter-spacing:1px;text-transform:uppercase;text-align:center}
		p.lead{margin:0;color:var(--muted);font-size:11px;font-family:'Press Start 2P', monospace;line-height:1.6}
		.timer{display:flex;gap:12px;margin-top:18px}
		.unit{background:linear-gradient(180deg,#fff,#fff);border-radius:12px;padding:12px 16px;text-align:center;min-width:74px;box-shadow:0 6px 18px rgba(112, 1, 47, 0.11)}
		.num{font-weight:700;font-size:20px;color:#ff6f93;font-family:'Press Start 2P', monospace}
		.lbl{font-size:9px;color:var(--muted);margin-top:6px;font-family:'Press Start 2P', monospace;letter-spacing:1px}
		/* Cute art side */
		.art{display:flex;flex-direction:column;align-items:center;gap:10px}
		.card-art{background:linear-gradient(180deg,#fff2fb,#fff);padding:12px;border-radius:14px;border:1px solid rgba(0,0,0,0.03)}
		.art-image{display:block;width:220px;height:auto;border-radius:14px}
		.small{font-size:10px;color:#ce5363;font-family:'Press Start 2P', monospace;line-height:1.6}
		footer{grid-column:1/-1;margin-top:6px;text-align:center;color:var(--muted);font-size:10px;font-family:'Press Start 2P', monospace;line-height:1.6}
		.bunny-strip{position:fixed;left:0;right:0;bottom:10px;height:160px;overflow:hidden;pointer-events:none;z-index:2}
		.bunny-strip-top{position:fixed;left:0;right:0;top:10px;height:300px;overflow:hidden;pointer-events:none;z-index:2}
		.bunny-runner{position:absolute;left:-90px;bottom:0;height:200px;width:auto;display:block;animation:bunnyRun 10s linear infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.12));background:transparent;image-rendering:auto}
		.bunny-runner-top{position:absolute;left:-90px;top:0;height:220px;width:auto;display:block;animation:bunnyRunTop 6s linear infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.12));background:transparent;image-rendering:auto}
		.bunny-fallback{position:absolute;left:-90px;bottom:0;font-size:54px;line-height:1;display:none;animation:bunnyRun 8s linear infinite}
		.heart-burst{position:absolute;left:50%;top:50%;pointer-events:none;opacity:0;transform:translate(-50%, -50%) scale(0.4);animation:heartPop 1.8s ease-out forwards;font-size:30px;line-height:1;color:#ff4f84;font-family:'Segoe UI Symbol','Apple Color Emoji','Noto Color Emoji','Arial Unicode MS',sans-serif;text-shadow:0 0 8px rgba(255,107,154,0.8)}
		@keyframes bunnyRun{0%{transform:translateX(0)}49%{transform:translateX(calc(100vw + 120px))}50%{transform:translateX(calc(100vw + 120px)) scaleX(-1)}100%{transform:translateX(0) scaleX(-1)}}
		@keyframes bunnyRunTop{0%{transform:translateX(0) scaleX(-1)}49%{transform:translateX(calc(100vw + 120px)) scaleX(-1)}50%{transform:translateX(calc(100vw + 120px))}100%{transform:translateX(0)}}
		@keyframes heartPop{0%{opacity:0;transform:translate(-50%, -50%) scale(0.2)}20%{opacity:1;transform:translate(calc(-50% + var(--drift-x, 0px)), calc(-50% + var(--drift-y, 0px))) scale(1.2)}100%{opacity:0;transform:translate(calc(-50% + var(--drift-x, 0px)), calc(-50% + var(--drift-y, 0px) - 160px)) scale(2.4)}}
		@keyframes heartFall{0%{top:-40px;opacity:0.7}100%{top:100vh;opacity:0}}
		@media(max-width:760px){.wrap{grid-template-columns:1fr;}
			.art-image{width:160px}}
	</style>
</head>
<body>
	<div id="heartLayer" class="heart-layer"></div>
	<div id="heartWaterfall" class="heart-waterfall"></div>
	<div id="heartLayerBottom" class="heart-layer-bottom"></div>
	<div class="bunny-strip-top" aria-hidden="true">
		<img class="bunny-runner-top" src="./jaxi.gif" alt="Running bunny top" onerror="this.style.display='none';" />
	</div>
	<div class="bunny-strip" aria-hidden="true">
		<img class="bunny-runner" src="./me.gif" alt="Running bunny" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
		<div class="bunny-fallback">🐰</div>
	</div>
	<div class="wrap">
		<div class="hero-text">
			<h1>Time until you are in Texas!</h1>
			<p class="lead">Your little bunny waits patiently... 🐰🐻</p>

			<div class="timer" aria-hidden>
				<div class="unit">
					<div id="days" class="num">0</div>
					<div class="lbl">Days</div>
				</div>
				<div class="unit">
					<div id="hours" class="num">0</div>
					<div class="lbl">Hours</div>
				</div>
				<div class="unit">
					<div id="minutes" class="num">0</div>
					<div class="lbl">Minutes</div>
				</div>
				<div class="unit">
					<div id="seconds" class="num">0</div>
					<div class="lbl">Seconds</div>
				</div>
			</div>
		</div>

		<div class="art">
			<div class="card-art">
				<a href="#" onclick="return false;">
					<img class="art-image" src="./photo.png" alt="Your image" />
				</a>
			</div>
			<div class="small"> I love you Jaxi <3 </div>
			<div style="margin-top:10px;width:100%;max-width:220px;">
				<audio id="bgAudio" loop playsinline preload="auto" style="display:none;"></audio>
				<button id="audioButton" type="button" style="display:block;width:100%;padding:10px 12px;border:0;border-radius:10px;background:#fff2f7;color:#da0053;font-family:'Press Start 2P', monospace;font-size:9px;cursor:pointer;">▶ Play music</button>
			</div>
		</div>

		<footer id="status">I give you hugs and kisses on July 18, 2026</footer>
	</div>

	<script>
		// Target date: July 18, 2026 (local time at midnight)
		const target = new Date('2026-07-18T00:00:00');
		const daysEl = document.getElementById('days');
		const hoursEl = document.getElementById('hours');
		const minsEl = document.getElementById('minutes');
		const secsEl = document.getElementById('seconds');
		const status = document.getElementById('status');
		const audio = document.getElementById('bgAudio');
		const audioButton = document.getElementById('audioButton');

		function update() {
			const now = new Date();
			let diff = Math.max(0, target - now);
			const days = Math.floor(diff / (1000*60*60*24));
			diff -= days * (1000*60*60*24);
			const hours = Math.floor(diff / (1000*60*60));
			diff -= hours * (1000*60*60);
			const minutes = Math.floor(diff / (1000*60));
			diff -= minutes * (1000*60);
			const seconds = Math.floor(diff / 1000);

			daysEl.textContent = String(days);
			hoursEl.textContent = String(hours).padStart(2,'0');
			minsEl.textContent = String(minutes).padStart(2,'0');
			secsEl.textContent = String(seconds).padStart(2,'0');

			if (target - now <= 0) {
				status.textContent = "See you soon! Je t'aime ❤️";
			}
		}

		function createHeartWaterfall(){
			const layer = document.getElementById('heartWaterfall');
			for (let i = 0; i < 8; i++) {
				setTimeout(() => {
					const heart = document.createElement('div');
					heart.className = 'heart-fall';
					heart.textContent = '♥';
					heart.style.left = Math.random() * 100 + '%';
					heart.style.top = '-40px';
					layer.appendChild(heart);
					setTimeout(() => heart.remove(), 4000);
				}, i * 300);
			}
		}

		function createHeartBurst(){
			const layer = document.getElementById('heartLayer');
			for (let i = 0; i < 16; i++) {
				const heart = document.createElement('div');
				heart.className = 'heart-burst';
				heart.textContent = '♥';
				heart.style.left = (35 + Math.random() * 30) + '%';
				heart.style.top = (35 + Math.random() * 30) + '%';
				const driftX = (Math.random() - 0.5) * 440;
				const driftY = -80 - Math.random() * 60;
				heart.style.setProperty('--drift-x', driftX + 'px');
				heart.style.setProperty('--drift-y', driftY + 'px');
				layer.appendChild(heart);
				setTimeout(() => heart.remove(), 1600);
			}
		}

		function createBottomHeartBurst(){
			const layer = document.getElementById('heartLayerBottom');
			for (let i = 0; i < 12; i++) {
				const heart = document.createElement('div');
				heart.className = 'heart-burst';
				heart.textContent = '♥';
				heart.style.left = Math.random() * 100 + '%';
				heart.style.bottom = '-30px';
				const driftX = (Math.random() - 0.5) * 300;
				const driftY = -120 - Math.random() * 80;
				heart.style.setProperty('--drift-x', driftX + 'px');
				heart.style.setProperty('--drift-y', driftY + 'px');
				layer.appendChild(heart);
				setTimeout(() => heart.remove(), 1600);
			}
		}

		function tryAudio(){
			audio.src = './music.mp3';
			audio.volume = 0.05;
			audio.load();
			audio.play().catch(() => {});
		}

		audioButton.addEventListener('click', () => {
			audio.src = './music.mp3';
			audio.volume = 0.05;
			audio.play();
			audioButton.style.display = 'none';
		});

		update();
		createHeartBurst();
		createBottomHeartBurst();
		createHeartWaterfall();
		tryAudio();
		setInterval(update, 1000);
		setInterval(createHeartBurst, 5000);
		setInterval(createBottomHeartBurst, 5000);
		setInterval(createHeartWaterfall, 4000);
	</script>
</body>
</html>
